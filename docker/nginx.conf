# HTTP: redirect all traffic to HTTPS (NFR13 — TLS 1.2+ enforcement)
# SECURITY: server_name is set to "localhost" for the redirect block so that
# $host in the 301 Location is bounded to this server's name. Production
# deployments MUST change server_name to the actual public hostname in both
# blocks — leaving server_name _ (catch-all) with $host allows an attacker
# to inject an arbitrary Host header and receive a 301 to an external domain.
server {
    listen 80;
    server_name localhost;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # TLS certificates — volume-mount via docker-compose:
    #   volumes:
    #     - ./certs:/etc/nginx/certs:ro
    # For local dev, generate a self-signed cert:
    #   openssl req -x509 -newkey rsa:4096 -keyout privkey.pem \
    #     -out fullchain.pem -days 365 -nodes -subj '/CN=localhost'
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # NFR13: TLS 1.2+ only — TLSv1 and TLSv1.1 are disabled.
    # A client negotiating TLS 1.0/1.1 is refused the handshake.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # Security headers — sent on ALL responses (including errors) via `always`.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP: 'self' works for RoboScope because all assets are bundled offline (no CDN).
    # VERIFY: after any Vite prod build change, run `make docker-dev` and check the
    # browser console for CSP violations — Vite can emit inline <script> blocks that
    # 'self' blocks. If violations appear, add a nonce or 'unsafe-inline' to script-src.
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # Limit upload size (report ZIP uploads)
    client_max_body_size 500m;

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Vue SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
